spring.application.name=springboot-restful-webservices
spring.datasource.url=jdbc:mysql://localhost:3306/user_management
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
#server.port=9090

management.endpoints.web.exposure.include=*
management.info.env.enabled=true
management.endpoint.health.show-details=always

info.app.name=Spring Boot RESTful Web services
info.app.description=Spring Boot RESTful Web services Demo
info.app.version=1.0.0

# Redis connection details
#spring.cache.type=redis
spring.cache.type=none
#spring.redis.host=redis-cache-y3ihsd.serverless.use1.cache.amazonaws.com:6379
spring.redis.host=localhost
spring.redis.port=6380
#spring.redis.password=  # If your Redis is password-protected, enter the password here (optional)
spring.redis.ssl=true
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cache=DEBUG

logging.level.org.springframework.web=DEBUG
logging.level.org.apache.http.impl.conn=DEBUG

#spring.security.user.name=sumit
#spring.security.user.password=sumit2525
#spring.security.user.roles=ADMIN

#spring.profiles.active=prod

spring.output.ansi.enabled=ALWAYS

# Show SQL queries
spring.jpa.show-sql=true

# Format queries (readable)
spring.jpa.properties.hibernate.format_sql=true

# Show actual parameter values (VERY useful)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE